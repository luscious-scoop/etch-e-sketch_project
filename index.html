<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Annie+Use+Your+Telescope&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch-e-sketch</title>
  </head>
  <body>
    <h1 class="header annie-use-your-telescope-regular">Etch-e-sketch</h1>

    <div class="container">
      <div class="selection-container">
        <input type="color" class="color-box" id="color-box" />
        <button class="btn" id="randomize-btn">Randomize</button>
        <button class="btn" id="eraser-btn">Eraser</button>
        <button class="btn" id="create-btn">New Grid</button>
        <button class="btn" id="reset-btn">Reset</button>
      </div>
      <div class="grid-container"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
